# Disable module compression (BusyBox modprobe can't handle .ko.xz)
CONFIG_MODULE_COMPRESS_NONE=y
# CONFIG_MODULE_COMPRESS_XZ is not set

# Sound — required by DRM_VC4 (depends on SND && SND_SOC)
CONFIG_SOUND=y
CONFIG_SND=y
CONFIG_SND_SOC=y

# DRM/KMS — VC4 display driver + dependencies (must all be =y for built-in)
CONFIG_DRM=y
CONFIG_DRM_KMS_HELPER=y
CONFIG_DRM_GEM_DMA_HELPER=y
CONFIG_DRM_DISPLAY_HELPER=y
CONFIG_DRM_DISPLAY_DP_HELPER=y
CONFIG_DRM_DISPLAY_HDMI_HELPER=y
CONFIG_DRM_PANEL_BRIDGE=y
CONFIG_DRM_V3D=y
CONFIG_DRM_VC4=y

# I2C — built-in for DDC (HDMI EDID) so VC4 doesn't defer-probe for ~1s
CONFIG_I2C=y
CONFIG_I2C_BRCMSTB=y

# USB HID for touchscreen
CONFIG_HID=y
CONFIG_USB_HID=y
CONFIG_INPUT_EVDEV=y
CONFIG_INPUT_TOUCHSCREEN=y
CONFIG_TOUCHSCREEN_USB_COMPOSITE=y

# WiFi — brcmfmac as module (needs rootfs mounted for firmware files)
CONFIG_WIRELESS=y
CONFIG_RFKILL=y
CONFIG_CFG80211=y
CONFIG_MAC80211=y
CONFIG_BRCMUTIL=m
CONFIG_BRCMFMAC=m
CONFIG_BRCMFMAC_SDIO=y

# Disable unused features for faster boot
# CONFIG_KVM is not set
# CONFIG_BT is not set
# CONFIG_NFS_FS is not set
# CONFIG_NFSD is not set
# CONFIG_SUNRPC is not set
# CONFIG_ISCSI_TCP is not set
# CONFIG_ISCSI_BOOT_SYSFS is not set
# CONFIG_SCSI is not set
# CONFIG_BLK_DEV_LOOP is not set
# CONFIG_BLK_DEV_RAM is not set

# Disable CEC/IR remote control (saves ~0.2s — HDMI CEC + RC keymap init)
# CONFIG_RC_CORE is not set
# CONFIG_MEDIA_CEC_SUPPORT is not set
# CONFIG_DRM_VC4_HDMI_CEC is not set

# Disable camera/video codec (not needed for gauge cluster)
# CONFIG_VIDEO_DEV is not set
# CONFIG_MEDIA_SUPPORT is not set

# Disable wired ethernet (WiFi only)
# CONFIG_MACB is not set

# Disable unused USB drivers
# CONFIG_USB_R8152 is not set
# CONFIG_USB_NET_DRIVERS is not set
# CONFIG_USB_LAN78XX is not set
# CONFIG_USB_NET_SMSC95XX is not set

# Disable ftrace (saves ~44K entry allocation at boot)
# CONFIG_FTRACE is not set

# Disable GPIO memory mapping (5 regions we don't need)
# CONFIG_GPIO_RASPBERRYPI_EXP is not set

# Disable KASLR (avoids forced KPTI overhead on every syscall)
# CONFIG_RANDOMIZE_BASE is not set

# Disable simple-framebuffer (vc4 takes over immediately)
# CONFIG_FB_SIMPLE is not set

# Disable VGA arbiter (no VGA hardware)
# CONFIG_VGA_ARB is not set

# Disable zbud/zswap compressed memory
# CONFIG_ZBUD is not set
# CONFIG_ZSWAP is not set

# Disable LED triggers
# CONFIG_LEDS_TRIGGER_CPU is not set

# Disable BSG (block SCSI generic)
# CONFIG_BLK_DEV_BSG is not set

# Embedded optimizations
CONFIG_EMBEDDED=y
CONFIG_CC_OPTIMIZE_FOR_SIZE=y

# Lower tick rate (less scheduler overhead)
CONFIG_HZ_100=y
CONFIG_HZ=100

# Async driver probing (parallelize non-critical driver init)
CONFIG_SYSTEM_TRUSTED_KEYS=""

# Slab allocator optimization
CONFIG_SLAB_MERGE_DEFAULT=y

# Disable OTG USB (not needed)
# CONFIG_USB_DWC2 is not set

# Disable PS/2 mouse emulation
# CONFIG_INPUT_MOUSEDEV is not set

# Disable unused IO schedulers (keep only mq-deadline)
# CONFIG_IOSCHED_BFQ is not set
# CONFIG_MQ_IOSCHED_KYBER is not set

# Disable unused filesystem/network features
# CONFIG_FSCACHE is not set
# CONFIG_CACHEFILES_FS is not set
# CONFIG_QUOTA is not set
# CONFIG_PTP_1588_CLOCK is not set
# CONFIG_PPS is not set

# Reduce network hash table sizes for embedded use
CONFIG_BASE_SMALL=1

# Disable taskstats/audit (unused overhead)
# CONFIG_TASKSTATS is not set
# CONFIG_AUDIT is not set

# Disable unused kernel features
# CONFIG_PROFILING is not set
# CONFIG_PERF_EVENTS is not set
# CONFIG_DEBUG_FS is not set
# CONFIG_KALLSYMS is not set

# FAT/VFAT filesystem — needed to mount boot partition for debug logs
CONFIG_NLS=y
CONFIG_NLS_CODEPAGE_437=y
CONFIG_NLS_ISO8859_1=y
CONFIG_FAT_FS=y
CONFIG_VFAT_FS=y
