# Disable module compression (BusyBox modprobe can't handle .ko.xz)
CONFIG_MODULE_COMPRESS_NONE=y
# CONFIG_MODULE_COMPRESS_XZ is not set

# Sound — required by DRM_VC4 (depends on SND && SND_SOC)
CONFIG_SOUND=y
CONFIG_SND=y
CONFIG_SND_SOC=y

# DRM/KMS — VC4 display driver + dependencies (must all be =y for built-in)
CONFIG_DRM=y
CONFIG_DRM_KMS_HELPER=y
CONFIG_DRM_GEM_DMA_HELPER=y
CONFIG_DRM_DISPLAY_HELPER=y
CONFIG_DRM_DISPLAY_DP_HELPER=y
CONFIG_DRM_DISPLAY_HDMI_HELPER=y
CONFIG_DRM_PANEL_BRIDGE=y
CONFIG_DRM_V3D=y
CONFIG_DRM_VC4=y

# USB HID for touchscreen
CONFIG_HID=y
CONFIG_USB_HID=y
CONFIG_INPUT_EVDEV=y
CONFIG_INPUT_TOUCHSCREEN=y
CONFIG_TOUCHSCREEN_USB_COMPOSITE=y

# WiFi — brcmfmac + dependencies (must all be =y for built-in)
CONFIG_WIRELESS=y
CONFIG_RFKILL=y
CONFIG_CFG80211=y
CONFIG_MAC80211=y
CONFIG_BRCMUTIL=y
CONFIG_BRCMFMAC=y
CONFIG_BRCMFMAC_SDIO=y
